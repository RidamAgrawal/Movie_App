name: Deploy

on:
  push:
    branches: [main]

jobs:
  inject-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write                    # needed to push back to main

    steps:
      - uses: actions/checkout@v3

      - name: Inject secrets into api.js
        run: |
          sed -i "s|__MOVIE_ID__|${{ secrets.APPSCRIPT_MOVIES_DEPLOYMENTID }}|g" api.js
          sed -i "s|__USERS_ID__|${{ secrets.APPSCRIPT_REGISTEREDUSERS_DEPLOYMENTID }}|g" api.js
          sed -i "s|__COLLECTIONS_ID__|${{ secrets.APPSCRIPT_USERSDATA_DEPLOYMENTID }}|g" api.js

      - name: Verify injection            # check this in Actions log
        run: grep "exec" api.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,.gitignore,.env'  # don't expose these
```

Then set GitHub Pages to serve from **`gh-pages` branch**:
```
Settings → Pages → Branch → gh-pages → / (root) → Save