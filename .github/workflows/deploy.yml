name: Deploy

on:
  push:
    branches: [main]

jobs:
  inject-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v3

      - name: Check secrets exist          # ← added here
        run: |
          [ -z "${{ secrets.APPSCRIPT_MOVIES_DEPLOYMENTID }}" ] && echo "MOVIES secret is EMPTY" || echo "MOVIES secret is SET"
          [ -z "${{ secrets.APPSCRIPT_REGISTEREDUSERS_DEPLOYMENTID }}" ] && echo "USERS secret is EMPTY" || echo "USERS secret is SET"
          [ -z "${{ secrets.APPSCRIPT_USERSDATA_DEPLOYMENTID }}" ] && echo "COLLECTIONS secret is EMPTY" || echo "COLLECTIONS secret is SET"

      - name: Inject secrets
        run: |
          sed -i "s|__MOVIE_ID__|${{ secrets.APPSCRIPT_MOVIES_DEPLOYMENTID }}|g" api.js
          sed -i "s|__USERS_ID__|${{ secrets.APPSCRIPT_REGISTEREDUSERS_DEPLOYMENTID }}|g" api.js
          sed -i "s|__COLLECTIONS_ID__|${{ secrets.APPSCRIPT_USERSDATA_DEPLOYMENTID }}|g" api.js

      - name: Verify injection
        run: grep "exec" api.js

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4